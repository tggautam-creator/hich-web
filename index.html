    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- PWA / mobile home-screen -->
    <meta name="theme-color" content="#00A8F3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TAGO RIDES" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>TAGO — Smarter Rides, Shared Routes</title>

    <!-- SEO -->
    <meta name="description" content="TAGO is a student carpooling app for UC Davis. Share rides to Sacramento, the Bay Area, and beyond — cheaper than Uber, built for Aggies." />
    <meta name="keywords" content="tago rides, UC Davis carpooling, Davis Sacramento ride, student rideshare, tago rideshare" />
    <link rel="canonical" href="https://www.tagorides.com/" />

    <!-- Open Graph — controls how link looks when shared on iMessage, WhatsApp, Instagram etc -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tagorides.com/" />
    <meta property="og:title" content="TAGO — Smarter Rides, Shared Routes" />
    <meta property="og:description" content="Student carpooling for UC Davis. Share rides to Sacramento, the Bay Area, and beyond. Cheaper than Uber, built for Aggies." />
    <meta property="og:image" content="https://www.tagorides.com/og-image.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAGO — Smarter Rides, Shared Routes" />
    <meta name="twitter:description" content="Student carpooling for UC Davis. Share rides to Sacramento, the Bay Area, and beyond." />
    <meta name="twitter:image" content="https://www.tagorides.com/og-image.png" />

    <!--
      Apple Smart App Banner + iPhone-auto-redirect to App Store
      ──────────────────────────────────────────────────────────
      Both are gated on `APP_STORE_NUMERIC_ID` below being set to a
      real 10-digit Apple App ID. Until App Store Connect issues yours
      (Phase 2 — listing creation), leave the constant as `null` and
      both the meta tag + the redirect short-circuit cleanly. Once you
      have the ID, change ONE LINE (the constant) and both light up.
    -->
    <script>
      (function () {
        // App Store Connect numeric App ID for TAGO RIDES. Live on the
        // US App Store since 2026-05-13.
        // Full canonical URL: https://apps.apple.com/us/app/tago-rides/id6763382426
        var APP_STORE_NUMERIC_ID = '6763382426'

        // Inject the Smart App Banner meta tag (passive native banner
        // at the top of Safari on iPhone — dismissable, no friction).
        // Renders even when the auto-redirect below is skipped.
        var meta = document.createElement('meta')
        meta.name = 'apple-itunes-app'
        meta.content = 'app-id=' + APP_STORE_NUMERIC_ID
        document.head.appendChild(meta)

        // iPhone auto-redirect on first paint. Three exit cases:
        //  - User opts out via `?web=1` (TestFlight reviewers / power
        //    users who explicitly want the webapp on their phone).
        //  - Not on iOS (Android + desktop fall through to the webapp).
        //  - Anything throws (e.g. URL parsing fails on legacy
        //    browsers) — silently fall through.
        //
        // 2026-05-13 — in-app browser blocker REMOVED. The
        // `https://apps.apple.com/...` URL is a Universal Link that
        // iOS resolves directly to the App Store app from every
        // common in-app webview (Instagram, FB, Twitter/X, TikTok,
        // LINE, WeChat). Worst case the App Store opens; second-worst
        // case the user sees apps.apple.com's web page with a big
        // "View" button that opens the App Store on tap. Either is
        // far better than dropping the user into the webapp with no
        // visible install CTA.
        try {
          var ua = navigator.userAgent || ''
          var isIOS = /iPhone|iPod/.test(ua) && !window.MSStream
          var url = new URL(window.location.href)
          var optedOutOfRedirect = url.searchParams.get('web') === '1'
          if (isIOS && !optedOutOfRedirect) {
            window.location.replace('https://apps.apple.com/us/app/tago-rides/id' + APP_STORE_NUMERIC_ID)
          }
        } catch (_) {
          // Best-effort. Fall through to the web app on any error.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
