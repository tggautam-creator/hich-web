<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />

    <!-- PWA / mobile home-screen -->
    <meta name="theme-color" content="#00A8F3" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TAGO" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <title>TAGO — Smarter Rides, Shared Routes</title>

    <!-- SEO -->
    <meta name="description" content="TAGO is a student carpooling app for UC Davis. Share rides to Sacramento, the Bay Area, and beyond — cheaper than Uber, built for Aggies." />
    <meta name="keywords" content="tago rides, UC Davis carpooling, Davis Sacramento ride, student rideshare, tago rideshare" />
    <link rel="canonical" href="https://www.tagorides.com/" />

    <!-- Open Graph — controls how link looks when shared on iMessage, WhatsApp, Instagram etc -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tagorides.com/" />
    <meta property="og:title" content="TAGO — Smarter Rides, Shared Routes" />
    <meta property="og:description" content="Student carpooling for UC Davis. Share rides to Sacramento, the Bay Area, and beyond. Cheaper than Uber, built for Aggies." />
    <meta property="og:image" content="https://www.tagorides.com/og-image.png" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAGO — Smarter Rides, Shared Routes" />
    <meta name="twitter:description" content="Student carpooling for UC Davis. Share rides to Sacramento, the Bay Area, and beyond." />
    <meta name="twitter:image" content="https://www.tagorides.com/og-image.png" />

    <!--
      Apple Smart App Banner — passive native banner that surfaces at the
      top of Safari on iPhone/iPad with a "View" / "Open" CTA. Apple
      shows it automatically; user can dismiss it with no friction.
      Replace `app-id=PLACEHOLDER` with your Apple Numeric App ID once
      App Store Connect issues it (visible at App Store Connect → My
      Apps → your app → "Apple ID" — a 10-digit number).
    -->
    <meta name="apple-itunes-app" content="app-id=PLACEHOLDER" />

    <!--
      Aggressive iPhone redirect to App Store on first paint.
      Inline + before any other JS so iOS Safari follows the
      window.location.replace before React mounts — no flash of webapp.
      Skipped when:
        - User is in a known in-app browser (Instagram / Facebook /
          Twitter / TikTok in-app webviews) — those don't have the App
          Store available and would just show an error sheet.
        - User explicitly opts out via `?web=1` (so we can hand a "use
          the web app" link to power users / TestFlight reviewers).
        - User is on a non-iOS device (Android / desktop) — they go
          straight into the SPA.
      Replace `idPLACEHOLDER` with your real App Store URL once the
      App Store Connect listing is live (e.g.
      `https://apps.apple.com/app/tago-rides/id1234567890`).
    -->
    <script>
      (function () {
        try {
          var ua = navigator.userAgent || ''
          var isIOS = /iPhone|iPod/.test(ua) && !window.MSStream
          var isInAppBrowser = /(FBAN|FBAV|Instagram|Twitter|Snapchat|TikTok|Line|WeChat)/i.test(ua)
          var url = new URL(window.location.href)
          var optedOutOfRedirect = url.searchParams.get('web') === '1'
          var APP_STORE_URL = 'https://apps.apple.com/app/idPLACEHOLDER'
          if (isIOS && !isInAppBrowser && !optedOutOfRedirect) {
            window.location.replace(APP_STORE_URL)
          }
        } catch (_) {
          // Best-effort. If anything throws, fall through to the web app.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
