    <!-- Open Graph — controls how link looks when shared on iMessage, WhatsApp, Instagram etc -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tagorides.com/" />
    <meta property="og:title" content="TAGO — Smarter Rides, Shared Routes" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TAGO — Smarter Rides, Shared Routes" />
    <meta name="twitter:description" content="Student carpooling for UC Davis. Share rides to Sacramento, the Bay Area, and beyond." />
    <meta name="twitter:image" content="https://www.tagorides.com/og-image.png" />

    <!--
      Apple Smart App Banner + iPhone-auto-redirect to App Store
      ──────────────────────────────────────────────────────────
      Both are gated on `APP_STORE_NUMERIC_ID` below being set to a
      real 10-digit Apple App ID. Until App Store Connect issues yours
      (Phase 2 — listing creation), leave the constant as `null` and
      both the meta tag + the redirect short-circuit cleanly. Once you
      have the ID, change ONE LINE (the constant) and both light up.
    -->
    <script>
      (function () {
        // App Store Connect numeric App ID — appstoreconnect.apple.com URL
        // pattern is `/apps/{this-id}/distribution`. The listing is
        // created (id 6763382426) but no build has been uploaded yet,
        // so the App Store URL 404s. Leaving this `null` short-circuits
        // both the iPhone auto-redirect AND the Smart App Banner so
        // visitors don't bounce to a broken App Store page. Flip back
        // to `'6763382426'` the moment a build ships to TestFlight /
        // App Store.
        var APP_STORE_NUMERIC_ID = null

        if (!APP_STORE_NUMERIC_ID) return

        // Inject the Smart App Banner meta tag (passive native banner
        // at top of Safari on iPhone/iPad — dismissable, no friction).
        var meta = document.createElement('meta')
        meta.name = 'apple-itunes-app'
        meta.content = 'app-id=' + APP_STORE_NUMERIC_ID
        document.head.appendChild(meta)

        // Aggressive iPhone redirect on first paint. Skipped when:
        //  - In a known in-app browser (Instagram / FB / Twitter /
        //    TikTok webviews) — App Store deep-links don't open in
        //    those, would just error.
        //  - User opts out via `?web=1` (TestFlight / power-user
        //    escape hatch).
        //  - User isn't on iOS — Android + desktop fall through.
        try {
          var ua = navigator.userAgent || ''
          var isIOS = /iPhone|iPod/.test(ua) && !window.MSStream
          var isInAppBrowser = /(FBAN|FBAV|Instagram|Twitter|Snapchat|TikTok|Line|WeChat)/i.test(ua)
          var url = new URL(window.location.href)
          var optedOutOfRedirect = url.searchParams.get('web') === '1'
          if (isIOS && !isInAppBrowser && !optedOutOfRedirect) {
            window.location.replace('https://apps.apple.com/app/id' + APP_STORE_NUMERIC_ID)
          }
        } catch (_) {
          // Best-effort. If anything throws, fall through to the web app.
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="portal-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
